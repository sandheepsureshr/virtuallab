{% extends 'lab/base.html' %}
{% block title %}Login{% endblock %}

{% block body %}
<style>
  .auth-page {
    min-height: calc(100vh - 64px);
    display: flex; align-items: center; justify-content: center;
    background: radial-gradient(ellipse 60% 50% at 50% 0%, rgba(79,122,255,0.08), transparent 60%);
    padding: 40px 20px;
  }
  .auth-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 16px; padding: 40px; width: 100%; max-width: 420px;
    box-shadow: var(--shadow);
  }
  .auth-icon { font-size: 36px; margin-bottom: 8px; }
  .auth-title { font-size: 28px; font-weight: 800; margin-bottom: 4px; }
  .auth-sub { color: var(--text2); font-size: 14px; margin-bottom: 32px; }
</style>

<div class="auth-page">
  <div class="auth-card fade-up">
    <!-- <div class="auth-icon">🧪</div> -->
    <h1 class="auth-title">Welcome Back</h1>
    <p class="auth-sub">Sign in to continue your learning journey</p>

    <form method="post">
      {% csrf_token %}
      <div class="form-group">
        <label class="form-label">Username or Email</label>
        <input type="text" name="username" class="form-control" placeholder="Enter your username or email" required autofocus>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <div style="position: relative;">
          <input type="password" name="password" id="password" class="form-control" placeholder="Enter your password" required>
          <button type="button" id="togglePassword" style="position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--text2); cursor: pointer; font-size: 18px;">👁️</button>
        </div>
      </div>
      <button type="submit" class="btn btn-gradient w-full" style="width:100%; justify-content:center; padding:12px;">
        Login →
      </button>
    </form>

    <hr class="divider">
    <p style="text-align:center; font-size:14px; color:var(--text2);">
      Don't have an account? <a href="{% url 'register' %}" style="color:var(--accent);">Register here</a>
    </p>

    <!-- <div style="margin-top:24px; padding:14px; background:var(--bg2); border-radius:var(--r2); border:1px solid var(--border);">
      <p style="font-size:12px; color:var(--text3); margin-bottom:6px; font-weight:700;">DEMO CREDENTIALS</p>
      <p style="font-size:13px; color:var(--text2);">Admin: <code style="color:var(--accent3)">admin / admin123</code></p>
      <p style="font-size:13px; color:var(--text2);">Student: Register to create an account</p>
    </div> -->
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
  const togglePassword = document.getElementById('togglePassword');
  const passwordInput = document.getElementById('password');

  togglePassword.addEventListener('click', function() {
    const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
    passwordInput.setAttribute('type', type);
    this.textContent = type === 'password' ? '👁️' : '🙈';
  });
</script>
{% endblock %}
